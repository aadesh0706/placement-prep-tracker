services:
  - type: web
    name: placement-prep-backend
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/placement-prep-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATA_MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
